<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>撲克占卜 9/19/29 - 精確消除版</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-width: 82px;
            --overlap-height: -105px; 
            --highlight-color: #f1c40f;
            --error-color: #ff4757;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 { font-size: 1.3rem; margin: 5px 0; letter-spacing: 2px; }
        .status { margin-bottom: 10px; color: #888; font-size: 0.85rem; }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 140px;
        }
        .row {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 480px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        
        @keyframes breathe {
            0% { box-shadow: inset 0 0 5px var(--highlight-color); border-color: var(--highlight-color); }
            50% { box-shadow: inset 0 0 25px var(--highlight-color); border-color: white; }
            100% { box-shadow: inset 0 0 5px var(--highlight-color); border-color: var(--highlight-color); }
        }
        @keyframes alert-red {
            0% { background: transparent; }
            50% { background: rgba(255, 71, 87, 0.5); }
            100% { background: transparent; }
        }
        .row.can-match { animation: breathe 1.2s infinite; border-width: 2px; z-index: 10; }
        .row.must-action { animation: alert-red 0.3s infinite; border-color: var(--error-color) !important; z-index: 50; }
        .row.locked { opacity: 0.2; pointer-events: none; background: #000; border-style: dashed; }

        .card-container { width: var(--card-width); position: relative; transition: all 0.3s ease; }
        .card-img { width: 100%; height: auto; border-radius: 5px; display: block; box-shadow: 0 3px 8px rgba(0,0,0,0.6); }
        .card-container:not(:first-child) { margin-top: var(--overlap-height); }

        /* 標示即將消除的牌（視覺回饋） */
        .row.can-match .card-container:first-child,
        .row.can-match .card-container:nth-child(2),
        .row.can-match .card-container:last-child {
            filter: brightness(1.2) contrast(1.1);
            transform: translateY(-5px);
        }

        .controls-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            padding: 15px 0 calc(env(safe-area-inset-bottom) + 15px);
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #333;
            z-index: 100;
        }
        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-new { background: #444; color: #ccc; }
        .btn-draw { background: #d35400; color: white; flex-grow: 0.4; }

        .result-panel {
            position: fixed;
            top: 45%; left: 50%; transform: translate(-50%, -50%);
            background: #2c3e50; padding: 30px; border-radius: 20px;
            text-align: center; z-index: 200; width: 75%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 3px solid #f1c40f;
        }
    </style>
</head>
<body>

    <h1>撲克占卜 9 / 19 / 29</h1>
    <div class="status" id="deck-count">剩餘：52</div>

    <div class="board">
        <div class="row" id="row-0" onclick="game.handleRowClick(0)"></div>
        <div class="row" id="row-1" onclick="game.handleRowClick(1)"></div>
        <div class="row" id="row-2" onclick="game.handleRowClick(2)"></div>
        <div class="row" id="row-3" onclick="game.handleRowClick(3)"></div>
    </div>

    <div id="result" class="result-panel" style="display: none;"></div>

    <div class="controls-footer">
        <button class="btn btn-new" onclick="game.init()">新遊戲</button>
        <button class="btn btn-draw" id="next-btn" onclick="game.drawNext()">翻下一張</button>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/kuochili-ops/xcards/master/svg/face/";
        
        const game = {
            deck: [],
            rows: [[], [], [], []],
            locked: [false, false, false, false],
            currentIndex: 0,
            pendingMatch: -1,

            init() {
                const suits = ['C', 'D', 'H', 'S'];
                const ranks = ['A', '2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K'];
                this.deck = [];
                suits.forEach(s => ranks.forEach(r => this.deck.push({ rank: r, suit: s })));
                this.deck.sort(() => Math.random() - 0.5);
                
                this.rows = [[], [], [], []];
                this.locked = [false, false, false, false];
                this.currentIndex = 0;
                this.pendingMatch = -1;
                
                document.getElementById('result').style.display = 'none';
                document.getElementById('next-btn').disabled = false;
                this.render();
            },

            getVal(rank) {
                if (rank === 'A') return 1;
                if (['T', 'J', 'Q', 'K'].includes(rank)) return 10;
                return parseInt(rank);
            },

            drawNext() {
                // 如果目前有排可以消除，強制先點擊消除
                if (this.pendingMatch !== -1) {
                    const el = document.getElementById(`row-${this.pendingMatch}`);
                    el.classList.add('must-action');
                    setTimeout(() => el.classList.remove('must-action'), 800);
                    return;
                }

                if (this.deck.length === 0) return;

                let checked = 0;
                while (this.locked[this.currentIndex] && checked < 4) {
                    this.currentIndex = (this.currentIndex + 1) % 4;
                    checked++;
                }

                if (checked === 4) { this.endGame(); return; }

                const card = this.deck.shift();
                this.rows[this.currentIndex].push(card);
                
                // 檢查規則：第 1 張 + 第 2 張 + 最後一張
                this.checkStatus(this.currentIndex);
                
                this.currentIndex = (this.currentIndex + 1) % 4;
                this.render();

                if (this.deck.length === 0 && this.pendingMatch === -1) this.endGame();
            },

            checkStatus(rowIndex) {
                const row = this.rows[rowIndex];
                if (row.length < 3) return;

                const sum = this.getVal(row[0].rank) + 
                            this.getVal(row[1].rank) + 
                            this.getVal(row[row.length - 1].rank);

                if ([9, 19, 29].includes(sum)) {
                    this.pendingMatch = rowIndex;
                } else {
                    this.pendingMatch = -1;
                }
            },

            handleRowClick(rowIndex) {
                if (this.pendingMatch === rowIndex) {
                    const row = this.rows[rowIndex];
                    
                    // 執行精確消除：只刪除第 1, 2 張和最後一張
                    // 注意：刪除順序要從後面開始，避免 index 跑掉
                    row.splice(row.length - 1, 1); // 刪除最後一張
                    row.splice(0, 2);              // 刪除前兩張
                    
                    // 檢查是否因為消除而導致該排空了
                    if (row.length === 0) {
                        this.locked[rowIndex] = true;
                    }
                    
                    this.pendingMatch = -1;
                    
                    // 消除後可能中間留下來的牌又符合消除規則，所以要再檢查一次
                    this.checkStatus(rowIndex);
                    
                    this.render();
                    if (this.deck.length === 0 && this.pendingMatch === -1) this.endGame();
                }
            },

            endGame() {
                const all = this.rows.flat();
                this.showResult(all);
            },

            showResult(remaining) {
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                document.getElementById('next-btn').disabled = true;

                if (remaining.length === 1) {
                    const final = remaining[0];
                    const luckMap = { 'S': '【黑桃】沉穩應對', 'H': '【紅心】幸運降臨', 'D': '【方塊】財運亨通', 'C': '【梅花】步步為營' };
                    resultDiv.innerHTML = `<h2 style="color:#f1c40f">占卜結果</h2><p style="font-size:1.2rem">${luckMap[final.suit]}</p><button class="btn btn-draw" style="width:100%;margin-top:15px" onclick="game.init()">重新開始</button>`;
                } else {
                    resultDiv.innerHTML = `<h2 style="color:#ff4757">運氣爆炸</h2><p>剩餘 ${remaining.length} 張牌，尚未清空。</p><button class="btn btn-draw" style="width:100%;margin-top:15px" onclick="game.init()">再次挑戰</button>`;
                }
            },

            render() {
                document.getElementById('deck-count').innerText = `剩餘：${this.deck.length}`;
                for (let i = 0; i < 4; i++) {
                    const rowEl = document.getElementById(`row-${i}`);
                    rowEl.innerHTML = '';
                    rowEl.classList.remove('can-match', 'must-action');
                    
                    if (this.locked[i]) rowEl.classList.add('locked');
                    if (this.pendingMatch === i) rowEl.classList.add('can-match');

                    this.rows[i].forEach(card => {
                        const container = document.createElement('div');
                        container.className = 'card-container';
                        const img = document.createElement('img');
                        img.src = `${baseUrl}${card.rank}${card.suit}.svg`;
                        img.className = 'card-img';
                        container.appendChild(img);
                        rowEl.appendChild(container);
                    });
                }
            }
        };
        
        game.init();
    </script>
</body>
</html>
