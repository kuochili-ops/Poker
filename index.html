<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>撲克占卜 - 多重消除版</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-width: 82px;
            --overlap-height: -82px; 
            --error-color: #ff4757;
            --match-hint: #2ecc71;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-x: hidden;
        }
        h1 { font-size: 1.2rem; margin: 5px 0; letter-spacing: 1px; color: #eee; }
        .status { margin-bottom: 10px; color: #888; font-size: 0.85rem; }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 160px;
        }
        .row {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 520px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        
        @keyframes alert-red {
            0% { background: transparent; }
            50% { background: rgba(255, 71, 87, 0.5); box-shadow: inset 0 0 15px var(--error-color); }
            100% { background: transparent; }
        }
        .row.must-action { animation: alert-red 0.3s 3; border-color: var(--error-color) !important; z-index: 200; }
        .row.locked { opacity: 0.2; pointer-events: none; background: #000; border-style: dashed; }

        .card-container {
            width: var(--card-width);
            position: relative;
            margin-top: var(--overlap-height);
        }
        .card-container:first-child { margin-top: 12px; }

        .card-img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.5); 
            background: white; 
        }

        .controls-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            padding: 15px 0 calc(env(safe-area-inset-bottom) + 15px);
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #333;
            z-index: 500;
        }
        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-new { background: #444; color: #ccc; }
        .btn-draw { background: #d35400; color: white; flex-grow: 0.4; }

        .result-panel {
            position: fixed;
            top: 45%; left: 50%; transform: translate(-50%, -50%);
            background: #2c3e50; padding: 30px; border-radius: 20px;
            text-align: center; z-index: 1000; width: 80%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); border: 3px solid #f1c40f;
        }
    </style>
</head>
<body>

    <h1>撲克占卜 (多元消除)</h1>
    <div class="status" id="deck-count">剩餘牌數：40</div>

    <div class="board">
        <div class="row" id="row-0" onclick="game.handleRowClick(0)"></div>
        <div class="row" id="row-1" onclick="game.handleRowClick(1)"></div>
        <div class="row" id="row-2" onclick="game.handleRowClick(2)"></div>
        <div class="row" id="row-3" onclick="game.handleRowClick(3)"></div>
    </div>

    <div id="result" class="result-panel" style="display: none;"></div>

    <div class="controls-footer">
        <button class="btn btn-new" onclick="game.init()">重新洗牌</button>
        <button class="btn btn-draw" id="next-btn" onclick="game.drawNext()">翻下一張</button>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/kuochili-ops/xcards/master/svg/face/";
        
        const game = {
            deck: [],
            rows: [[], [], [], []],
            locked: [false, false, false, false],
            currentIndex: 0,
            pendingRow: -1, // 紀錄哪一列有可消除組合

            init() {
                const suits = ['C', 'D', 'H', 'S'];
                const ranks = ['A', '2', '3', '4', '5', '6', '7', '8', '9', 'T'];
                this.deck = [];
                suits.forEach(s => ranks.forEach(r => this.deck.push({ rank: r, suit: s })));
                this.deck.sort(() => Math.random() - 0.5);
                
                this.rows = [[], [], [], []];
                this.locked = [false, false, false, false];
                this.currentIndex = 0;
                this.pendingRow = -1;
                
                document.getElementById('result').style.display = 'none';
                document.getElementById('next-btn').disabled = false;
                this.render();
            },

            getVal(rank) {
                if (rank === 'A') return 1;
                if (rank === 'T') return 10;
                return parseInt(rank);
            },

            // 核心邏輯：檢查該列是否有任何符合規定的三張組合
            getMatchMode(row) {
                if (row.length < 3) return null;
                
                const v = row.map(c => this.getVal(c.rank));
                const last = v.length - 1;

                // 模式 A: 最後三張 (Last 3)
                const sumLast3 = v[last] + v[last-1] + v[last-2];
                if ([9, 19, 29].includes(sumLast3)) return 'LAST3';

                // 模式 B: 頭二尾一 (First 2 + Last 1)
                const sumHeadTail = v[0] + v[1] + v[last];
                if ([9, 19, 29].includes(sumHeadTail)) return 'HEADTAIL';

                // 模式 C: 頭一尾二 (First 1 + Last 2)
                const sumTailHead = v[0] + v[last] + v[last-1];
                if ([9, 19, 29].includes(sumTailHead)) return 'TAILHEAD';

                return null;
            },

            drawNext() {
                // 檢查全場是否有漏掉的組合
                let foundMatch = -1;
                for(let i=0; i<4; i++) {
                    if (this.getMatchMode(this.rows[i])) {
                        foundMatch = i;
                        break;
                    }
                }

                if (foundMatch !== -1) {
                    const el = document.getElementById(`row-${foundMatch}`);
                    el.classList.add('must-action');
                    setTimeout(() => el.classList.remove('must-action'), 900);
                    return;
                }

                if (this.deck.length === 0) return;

                let checked = 0;
                while (this.locked[this.currentIndex] && checked < 4) {
                    this.currentIndex = (this.currentIndex + 1) % 4;
                    checked++;
                }

                if (checked === 4) { this.endGame(); return; }

                this.rows[this.currentIndex].push(this.deck.shift());
                this.currentIndex = (this.currentIndex + 1) % 4;
                this.render();

                if (this.deck.length === 0) {
                    // 發完牌後如果還有沒消的，不直接結束
                    let stillHasMoves = this.rows.some(r => this.getMatchMode(r));
                    if (!stillHasMoves) this.endGame();
                }
            },

            handleRowClick(rowIndex) {
                const row = this.rows[rowIndex];
                const mode = this.getMatchMode(row);

                if (mode) {
                    if (mode === 'LAST3') {
                        row.splice(row.length - 3, 3);
                    } else if (mode === 'HEADTAIL') {
                        row.splice(row.length - 1, 1);
                        row.splice(0, HEADTAIL = 2);
                    } else if (mode === 'TAILHEAD') {
                        row.splice(row.length - 2, 2);
                        row.splice(0, 1);
                    }

                    if (row.length === 0) this.locked[rowIndex] = true;
                    this.render();
                    
                    // 消除後可能產生新組合，若沒了且沒牌則結束
                    if (this.deck.length === 0) {
                        if (!this.rows.some(r => this.getMatchMode(r))) this.endGame();
                    }
                }
            },

            endGame() {
                const all = this.rows.flat();
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                document.getElementById('next-btn').disabled = true;
                
                if (all.length <= 1) {
                    resultDiv.innerHTML = `<h2 style="color:#f1c40f">大成功！</h2><p>剩餘 ${all.length} 張牌</p><button class="btn btn-draw" style="width:100%" onclick="game.init()">新局</button>`;
                } else {
                    resultDiv.innerHTML = `<h2 style="color:#ff4757">遊戲結束</h2><p>剩餘 ${all.length} 張牌</p><button class="btn btn-draw" style="width:100%" onclick="game.init()">再試一次</button>`;
                }
            },

            render() {
                document.getElementById('deck-count').innerText = `剩餘牌數：${this.deck.length}`;
                for (let i = 0; i < 4; i++) {
                    const rowEl = document.getElementById(`row-${i}`);
                    rowEl.innerHTML = '';
                    if (this.locked[i]) rowEl.classList.add('locked');
                    else rowEl.classList.remove('locked');

                    this.rows[i].forEach((card, index) => {
                        const container = document.createElement('div');
                        container.className = 'card-container';
                        container.style.zIndex = index + 1;
                        const img = document.createElement('img');
                        img.src = `${baseUrl}${card.rank}${card.suit}.svg`;
                        img.className = 'card-img';
                        container.appendChild(img);
                        rowEl.appendChild(container);
                    });
                }
            }
        };
        game.init();
    </script>
</body>
</html>
