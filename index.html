<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>撲克占卜 9/19/29 - 半自動版</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-width: 80px;
            --overlap-height: -95px;
            --highlight-color: #f1c40f;
            --error-color: #ff4757;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 1.2rem; margin: 5px 0; }
        .status { margin-bottom: 10px; color: #888; font-size: 0.8rem; }

        /* 遊戲區域 */
        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 120px; /* 為底部按鈕留空間 */
        }
        .row {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 400px;
            border: 1px solid #333;
            border-radius: 10px;
            padding-top: 5px;
            background: rgba(255,255,255,0.03);
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }
        
        /* 提示閃爍效果 */
        @keyframes breathe {
            0% { box-shadow: 0 0 5px var(--highlight-color); border-color: #444; }
            50% { box-shadow: 0 0 20px var(--highlight-color); border-color: var(--highlight-color); }
            100% { box-shadow: 0 0 5px var(--highlight-color); border-color: #444; }
        }
        @keyframes alert-red {
            0% { background: transparent; }
            50% { background: rgba(255, 71, 87, 0.4); }
            100% { background: transparent; }
        }
        .row.can-match { animation: breathe 1.5s infinite; }
        .row.must-action { animation: alert-red 0.4s infinite; border-color: var(--error-color) !important; }
        .row.locked { opacity: 0.3; border-color: #550000; pointer-events: none; }

        .card-container { width: var(--card-width); position: relative; }
        .card-img { width: 100%; height: auto; border-radius: 5px; display: block; box-shadow: 0 2px 6px rgba(0,0,0,0.8); }
        .card-container:not(:first-child) { margin-top: var(--overlap-height); }

        /* 底部控制欄 */
        .controls-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #222;
            padding: 20px 0 calc(env(safe-area-inset-bottom) + 15px);
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #444;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-new { background: #555; color: white; }
        .btn-draw { background: #e67e22; color: white; flex-grow: 0.5; max-width: 200px; }
        .btn:disabled { background: #333; color: #777; }

        /* 結果面板 */
        .result-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2c3e50;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #3498db;
            width: 80%;
        }
    </style>
</head>
<body>

    <h1>撲克占卜 9 / 19 / 29</h1>
    <div class="status" id="deck-count">剩餘：52</div>

    <div class="board">
        <div class="row" id="row-0" onclick="game.handleRowClick(0)"></div>
        <div class="row" id="row-1" onclick="game.handleRowClick(1)"></div>
        <div class="row" id="row-2" onclick="game.handleRowClick(2)"></div>
        <div class="row" id="row-3" onclick="game.handleRowClick(3)"></div>
    </div>

    <div id="result" class="result-panel" style="display: none;"></div>

    <div class="controls-footer">
        <button class="btn btn-new" onclick="game.init()">重新開始</button>
        <button class="btn btn-draw" id="next-btn" onclick="game.drawNext()">翻下一張</button>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/kuochili-ops/xcards/master/svg/face/";
        
        const game = {
            deck: [],
            rows: [[], [], [], []],
            locked: [false, false, false, false],
            currentIndex: 0,
            pendingMatch: -1, // 紀錄哪一排需要先處理

            init() {
                const suits = ['C', 'D', 'H', 'S'];
                const ranks = ['A', '2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K'];
                this.deck = [];
                suits.forEach(s => ranks.forEach(r => this.deck.push({ rank: r, suit: s })));
                this.deck.sort(() => Math.random() - 0.5);
                
                this.rows = [[], [], [], []];
                this.locked = [false, false, false, false];
                this.currentIndex = 0;
                this.pendingMatch = -1;
                
                document.getElementById('result').style.display = 'none';
                document.getElementById('next-btn').disabled = false;
                this.render();
            },

            getVal(rank) {
                if (rank === 'A') return 1;
                if (['T', 'J', 'Q', 'K'].includes(rank)) return 10;
                return parseInt(rank);
            },

            drawNext() {
                // 防呆提醒：如果現在有排可以消除，強制先消除
                if (this.pendingMatch !== -1) {
                    const el = document.getElementById(`row-${this.pendingMatch}`);
                    el.classList.add('must-action');
                    setTimeout(() => el.classList.remove('must-action'), 1200);
                    return;
                }

                if (this.deck.length === 0) return;

                let checked = 0;
                while (this.locked[this.currentIndex] && checked < 4) {
                    this.currentIndex = (this.currentIndex + 1) % 4;
                    checked++;
                }

                if (checked === 4) { this.endGame(); return; }

                const card = this.deck.shift();
                this.rows[this.currentIndex].push(card);
                
                // 檢查是否符合消除條件 (不自動消除，改為標示)
                this.checkStatus(this.currentIndex);
                
                this.currentIndex = (this.currentIndex + 1) % 4;
                this.render();

                if (this.deck.length === 0 && this.pendingMatch === -1) this.endGame();
            },

            checkStatus(rowIndex) {
                const row = this.rows[rowIndex];
                if (row.length < 4) return;
                const sum = this.getVal(row[row.length-1].rank) + 
                            this.getVal(row[0].rank) + this.getVal(row[1].rank) + this.getVal(row[2].rank);

                if ([9, 19, 29].includes(sum)) {
                    this.pendingMatch = rowIndex;
                } else {
                    this.pendingMatch = -1;
                }
            },

            handleRowClick(rowIndex) {
                if (this.pendingMatch === rowIndex) {
                    // 執行手動消除
                    const row = this.rows[rowIndex];
                    row.splice(row.length - 1, 1);
                    row.splice(0, 3);
                    
                    if (row.length === 0) this.locked[rowIndex] = true;
                    this.pendingMatch = -1;
                    this.render();
                    
                    if (this.deck.length === 0) this.endGame();
                }
            },

            endGame() {
                const all = this.rows.flat();
                if (all.length > 1 && this.deck.length === 0) {
                    // 檢查是否還有任何可能存在的消除（防止發完牌後還有沒點的）
                    if (this.pendingMatch === -1) this.showResult(all);
                } else if (all.length <= 1) {
                    this.showResult(all);
                }
            },

            showResult(remaining) {
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                document.getElementById('next-btn').disabled = true;

                if (remaining.length === 1) {
                    const final = remaining[0];
                    const luckMap = { 'S': '普通', 'H': '極佳', 'D': '財運好', 'C': '勤奮收穫' };
                    resultDiv.innerHTML = `<h2>運勢：${luckMap[final.suit]}</h2><p>只剩一張 ${final.rank}${final.suit}，運氣不錯！</p><button class="btn btn-new" onclick="game.init()">再試一次</button>`;
                } else {
                    resultDiv.innerHTML = `<h2>運氣爆炸</h2><p>剩下 ${remaining.length} 張牌，今天不太順喔。</p><button class="btn btn-new" onclick="game.init()">重整心情</button>`;
                }
            },

            render() {
                document.getElementById('deck-count').innerText = `剩餘張數：${this.deck.length}`;
                for (let i = 0; i < 4; i++) {
                    const rowEl = document.getElementById(`row-${i}`);
                    rowEl.innerHTML = '';
                    
                    // 移除所有提醒樣式
                    rowEl.classList.remove('can-match', 'must-action');
                    if (this.locked[i]) rowEl.classList.add('locked');
                    if (this.pendingMatch === i) rowEl.classList.add('can-match');

                    this.rows[i].forEach(card => {
                        const container = document.createElement('div');
                        container.className = 'card-container';
                        const img = document.createElement('img');
                        img.src = `${baseUrl}${card.rank}${card.suit}.svg`;
                        img.className = 'card-img';
                        container.appendChild(img);
                        rowEl.appendChild(container);
                    });
                }
            }
        };
        
        game.init();
    </script>
</body>
</html>
