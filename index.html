<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六占卜：牌背修復版</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-width: 82px;
            --overlap-height: -85px; 
            --select-color: #f1c40f;
            --error-color: #ff4757;
            /* 修正後的白六牌背連結 */
            --back-url: url('https://raw.githubusercontent.com/kuochili-ops/xcards/master/svg/back/white6back.svg');
        }
        body {
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color); color: white; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { padding: 10px; text-align: center; background: #1a1a1a; border-bottom: 1px solid #333; }
        .status { color: #888; font-size: 0.85rem; }
        .main-container { flex: 1; overflow-y: auto; padding: 10px 10px 180px 10px; display: flex; justify-content: center; }
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 500px; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .row { 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 600px; border: 1px solid #333; border-radius: 8px; 
            background: rgba(255,255,255,0.02); transition: border-color 0.3s;
        }
        .row.error-blink { border-color: var(--error-color) !important; animation: shake 0.3s; }
        .row.row-locked { opacity: 0.3; pointer-events: none; border: 2px dashed #444; }

        .card-container { width: var(--card-width); height: 118px; position: relative; margin-top: var(--overlap-height); cursor: pointer; }
        .card-container:first-child { margin-top: 12px; }
        .card-container.selected img { outline: 4px solid var(--select-color); outline-offset: -4px; transform: translateY(-5px); z-index: 100; }
        .card-img { width: 100%; height: auto; border-radius: 6px; display: block; background: #fff; }

        .controls-footer { position: fixed; bottom: 0; width: 100%; background: rgba(20, 20, 20, 0.95); padding: 15px 0 calc(env(safe-area-inset-bottom) + 15px); display: flex; justify-content: center; gap: 15px; border-top: 1px solid #333; z-index: 2000; }
        .btn { padding: 14px 28px; font-size: 16px; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; }
        .btn-draw { background: #d35400; color: white; }
        
        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .reveal-stage { perspective: 1000px; text-align: center; width: 100%; }
        
        .flip-card { 
            width: 240px; height: 345px; position: relative; 
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; margin: 20px auto; 
        }
        .flip-card.is-flipped { transform: rotateY(180deg); }
        
        .flip-front, .flip-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* 強化牌背渲染邏輯 */
        .flip-front { 
            background-color: #fce4ec; /* 若圖片加載失敗，會顯示淡淡的粉紅色 */
            background-image: var(--back-url);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid #555;
        }
        
        .flip-back { transform: rotateY(180deg); background: white; }
        .flip-back img { width: 100%; height: 100%; display: block; object-fit: contain; }

        .hint-text { color: var(--select-color); margin-top: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <header>
        <h1>𓃥 白六占卜</h1>
        <div class="status">待置放牌堆：<span id="deck-count">40</span></div>
    </header>

    <div class="main-container"><div class="board" id="board"></div></div>

    <div id="result-overlay" class="result-overlay">
        <div class="reveal-stage">
            <h2 id="result-title" style="color: white; margin-bottom: 10px;"></h2>
            <div id="flip-card" class="flip-card" onclick="game.flipResult()">
                <div class="flip-front"></div>
                <div class="flip-back" id="card-front-img"></div>
            </div>
            <div class="hint-text" id="hint-msg">點擊「白六牌背」翻開啟示</div>
            <button class="btn btn-draw" style="margin-top:30px; display:none;" id="reset-btn" onclick="game.init()">重新開始</button>
        </div>
    </div>

    <div class="controls-footer"><button class="btn btn-draw" onclick="game.drawNext()">翻下一張</button></div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/kuochili-ops/xcards/master/svg/face/";
        const game = {
            deck: [], rows: [[],[],[],[]], isRowLocked: [false,false,false,false],
            selectedIndices: [], currentIndex: 0, isGameOver: false,

            init() {
                const suits = ['C','D','H','S'], ranks = ['A','2','3','4','5','6','7','8','9','T'];
                this.deck = [];
                suits.forEach(s => ranks.forEach(r => this.deck.push({rank:r, suit:s})));
                this.deck.sort(() => Math.random() - 0.5);
                this.rows = [[],[],[],[]]; this.isRowLocked = [false,false,false,false];
                this.selectedIndices = []; this.currentIndex = 0; this.isGameOver = false;
                
                document.getElementById('result-overlay').style.display = 'none';
                document.getElementById('flip-card').classList.remove('is-flipped');
                document.getElementById('reset-btn').style.display = 'none';
                document.getElementById('hint-msg').style.display = 'block';
                this.render();
            },

            getVal(r) { return r === 'A' ? 1 : (r === 'T' ? 10 : parseInt(r)); },

            checkForgottenMatches() {
                for(let i=0; i<4; i++) {
                    const r = this.rows[i], L = r.length;
                    if (L < 3 || this.isRowLocked[i]) continue;
                    const v = r.map(c => this.getVal(c.rank));
                    const check = (a,b,c) => [9,19,29].includes(a+b+c);
                    if (check(v[L-3], v[L-2], v[L-1]) || check(v[0], v[L-2], v[L-1]) || check(v[0], v[1], v[L-1])) return i;
                }
                return -1;
            },

            drawNext() {
                if (this.isGameOver || this.deck.length === 0) return;
                const matchIdx = this.checkForgottenMatches();
                if (matchIdx !== -1) { this.triggerError(matchIdx); return; }

                while (this.isRowLocked[this.currentIndex]) this.currentIndex = (this.currentIndex + 1) % 4;
                this.rows[this.currentIndex].push(this.deck.shift());
                this.currentIndex = (this.currentIndex + 1) % 4;
                this.render();
                this.checkEndGame();
            },

            handleCardClick(rowIdx, cardIdx) {
                if (this.isRowLocked[rowIdx]) return;
                if (this.selectedIndices.length > 0 && this.selectedIndices[0].row !== rowIdx) this.selectedIndices = [];
                const idx = this.selectedIndices.findIndex(s => s.idx === cardIdx);
                if (idx !== -1) this.selectedIndices.splice(idx, 1);
                else if (this.selectedIndices.length < 3) this.selectedIndices.push({row: rowIdx, idx: cardIdx});
                if (this.selectedIndices.length === 3) this.verifyMatch(rowIdx);
                else this.render();
            },

            verifyMatch(rowIdx) {
                const r = this.rows[rowIdx], L = r.length;
                const sel = this.selectedIndices.map(s => s.idx).sort((a,b)=>a-b);
                const sum = sel.reduce((acc, i) => acc + this.getVal(r[i].rank), 0);
                const validPos = (sel[0] === L-3 && sel[1] === L-2) || (sel[0] === 0 && sel[1] === L-2) || (sel[0] === 0 && sel[1] === 1);
                if ([9,19,29].includes(sum) && sel[2] === L-1 && validPos) {
                    const removed = sel.sort((a,b)=>b-a).map(i => r.splice(i, 1)[0]);
                    this.deck.push(...removed.reverse());
                    if (r.length === 0) this.isRowLocked[rowIdx] = true;
                } else {
                    this.triggerError(rowIdx);
                }
                this.selectedIndices = []; this.render();
                this.checkEndGame();
            },

            triggerError(i) {
                const el = document.getElementById(`row-${i}`);
                el.classList.add('error-blink');
                setTimeout(() => el.classList.remove('error-blink'), 500);
            },

            checkEndGame() {
                const allCards = this.rows.flat();
                const openRows = this.isRowLocked.filter(l => !l).length;
                if (openRows === 0 && (this.deck.length > 0 || allCards.length === 0)) {
                    this.prepareReveal(this.deck[0] || {rank:'A', suit:'S'}, "全消達成！白六的啟示");
                } else if (this.deck.length === 0) {
                    if (allCards.length === 1) this.prepareReveal(allCards[0], "最終的一張牌");
                    else if (allCards.length > 1) {
                        const lastCard = allCards[allCards.length - 1];
                        this.prepareReveal(lastCard, "真遺憾，再接再厲！");
                    }
                }
            },

            prepareReveal(card, title) {
                this.isGameOver = true;
                document.getElementById('result-title').innerText = title;
                document.getElementById('card-front-img').innerHTML = `<img src="${baseUrl}${card.rank}${card.suit}.svg">`;
                document.getElementById('result-overlay').style.display = 'flex';
            },

            flipResult() {
                document.getElementById('flip-card').classList.add('is-flipped');
                document.getElementById('hint-msg').style.display = 'none';
                document.getElementById('reset-btn').style.display = 'inline-block';
            },

            render() {
                const board = document.getElementById('board');
                board.innerHTML = '';
                document.getElementById('deck-count').innerText = this.deck.length;
                this.rows.forEach((rowData, i) => {
                    const rowEl = document.createElement('div');
                    rowEl.className = `row ${this.isRowLocked[i] ? 'row-locked' : ''}`;
                    rowEl.id = `row-${i}`;
                    rowData.forEach((card, idx) => {
                        const container = document.createElement('div');
                        container.className = `card-container ${this.selectedIndices.some(s=>s.row===i && s.idx===idx)?'selected':''}`;
                        container.onclick = () => this.handleCardClick(i, idx);
                        container.innerHTML = `<img src="${baseUrl}${card.rank}${card.suit}.svg" class="card-img">`;
                        rowEl.appendChild(container);
                    });
                    board.appendChild(rowEl);
                });
            }
        };
        game.init();
    </script>
</body>
</html>
